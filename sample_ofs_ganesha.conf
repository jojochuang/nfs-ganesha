# Sample NFS-Ganesha configuration with OFS FSAL
#
# This demonstrates the OFS (Ozone File System) FSAL configuration

# Basic NFS configuration
NFS_Core_Param {
    # Number of worker threads
    Nb_Worker = 16;
    
    # Use supplied name other than IP
    # This is for backward compatibility with IPv6 addresses
    NFS_IP_Name = "127.0.0.1";
    
    # Port for NFS service
    NFS_Port = 2049;
    
    # Enable NFS v4
    NFS_Protocols = "3,4";
}

# OFS FSAL configuration block
OFS {
    # Ozone URI specifying default volume and bucket
    # Format: [ozone://host:port/]volume/bucket
    OzoneURI = "ozone://localhost:9862/vol1/bucket1";
    
    # Whitelist of allowed volumes (comma-separated)
    # If not specified, all volumes are allowed
    VolumeWhitelist = "vol1, vol2, vol3";
    
    # Directory for staging files during operations
    StagingDir = "/var/cache/nfs-ganesha-ofs";
    
    # Maximum bytes to use for staging (1GB default)
    MaxStagingBytes = 1073741824;
    
    # Read-ahead buffer size in KB (1MB default)
    ReadAheadKB = 1024;
}

# Export configuration using OFS FSAL
EXPORT {
    # Export ID
    Export_Id = 101;
    
    # Export path (how it appears to NFS clients)
    Path = "/ozone";
    
    # Pseudo path for NFSv4
    Pseudo = "/ozone";
    
    # Access type
    Access_Type = "RW";
    
    # Squash settings
    Squash = "None";
    
    # Security flavors
    SecType = "sys";
    
    # Filesystem type
    FSAL {
        Name = "OFS";
    }
}